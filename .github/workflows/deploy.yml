name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_TBA_API_KEY: ${{ secrets.TBA_KEY }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Use Node 24 for all JS actions

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"    # Updated to Node 24 to remove deprecation warning
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site with Vite
        run: npm run build -- --base=/${{ github.event.repository.name }}/

      - name: Remove symlinks (if any)
        run: find ./dist -type l -exec rm -f {} +

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
